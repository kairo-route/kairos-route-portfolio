name: Create Netlify Site

on:
  workflow_dispatch:

jobs:
  create-site:
    runs-on: ubuntu-latest
    steps:
      - name: Create Netlify site via API
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.NETLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "kairos-route-portfolio",
              "account_slug": "kairo-route",
              "repo": {
                "provider": "github",
                "id": 1163337633,
                "repo": "kairo-route/kairos-route-portfolio",
                "private": false,
                "branch": "main",
                "cmd": "npm run build",
                "dir": ".next",
                "installation_id": 111521950
              }
            }' \
            https://api.netlify.com/api/v1/sites
